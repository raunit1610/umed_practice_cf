AWSTemplateFormatVersion: "2010-09-09"
Description: >
  uMed EHR Data Platform: S3 Bucket Stack
  Creates all eight S3 buckets (Raw, Staging, Intermediate, Data Warehouse,
  Analytics, Audit, Control, Athena Results) for a single environment with
  full HIPAA-compliant configuration.

Parameters:
  Environment:
    Type: String
    AllowedValues: [devil, qail, uatil, prodil]
    Description: Deployment environment.

  KmsKeyArn:
    Type: String
    Description: ARN of the Customer Managed Key (CMK).

  EnableProdServerLogging:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Enable server access logging.

Conditions:
  EnableDataBucketLogging: !Equals [!Ref EnableProdServerLogging, "true"]

Resources:

  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-raw-ehr-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      LifecycleConfiguration:
        Rules:
          - Id: RawToGlacierIR
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER_IR
                TransitionInDays: 90
      LoggingConfiguration:
        Fn::If:
          - EnableDataBucketLogging
          - DestinationBucketName: !Ref AuditBucket
            LogFilePrefix: !Sub "server-access-logs/raw-${Environment}/"
          - !Ref AWS::NoValue

  StagingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-stg-ehr-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      LoggingConfiguration:
        Fn::If:
          - EnableDataBucketLogging
          - DestinationBucketName: !Ref AuditBucket
            LogFilePrefix: !Sub "server-access-logs/staging-${Environment}/"
          - !Ref AWS::NoValue

  IntermediateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-int-ehr-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      LoggingConfiguration:
        Fn::If:
          - EnableDataBucketLogging
          - DestinationBucketName: !Ref AuditBucket
            LogFilePrefix: !Sub "server-access-logs/intermediate-${Environment}/"
          - !Ref AWS::NoValue

  DataWarehouseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-dw-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      LoggingConfiguration:
        Fn::If:
          - EnableDataBucketLogging
          - DestinationBucketName: !Ref AuditBucket
            LogFilePrefix: !Sub "server-access-logs/dw-${Environment}/"
          - !Ref AWS::NoValue

  AnalyticsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-analytics-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn

  AuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-audit-logs-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            Days: 2555

  AuditBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudTrailACLCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditBucket.Arn
          - Sid: AllowCloudTrailPutObject
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${AuditBucket.Arn}/cloudtrail/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  ControlBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-control-registry-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNonCurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "umed-athena-results-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAthenaResults
            Status: Enabled
            ExpirationInDays: 7
